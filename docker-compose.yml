services:
  indexforge:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /app/data
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
